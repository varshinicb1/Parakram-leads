services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sigma
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sigma}
      POSTGRES_DB: sigma_leads
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sigma_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - sigma_network

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    networks:
      - sigma_network

  celery_worker:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    command: celery -A app.workers.celery_app worker -l info -Q default
    networks:
      - sigma_network

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=https://api.yourdomain.com/api/v1
    networks:
      - sigma_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - sigma_network

volumes:
  postgres_data:

networks:
  sigma_network:
    driver: bridge
