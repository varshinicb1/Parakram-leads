name: VPS Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 2.0.0)
        required: true
        default: 2.0.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows release
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows-vps/installer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows bundle
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: python build.py --version ${{ github.event.inputs.version || github.ref_name }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-vps
          path: windows-vps/installer/dist/**

  linux:
    name: Build Linux release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linux-vps/installer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Linux bundle
        run: python build.py --version ${{ github.event.inputs.version || github.ref_name }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-vps
          path: linux-vps/installer/dist/**

  release:
    name: Publish GitHub release
    needs: [windows, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release notes
        run: |
          cat <<'EOF' > release-notes.md
          Parakram VPS release

          - Windows bundle from `windows-vps/installer/dist`
          - Linux bundle from `linux-vps/installer/dist`
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: release-artifacts/**/*
          body_path: release-notes.md
