name: VPS Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 3.0.0)
        required: true
        default: 3.0.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-msi:
    name: Build Windows MSI
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: windows-vps

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: windows-vps/dashboard/package-lock.json

      - name: Install WiX Toolset v7
        run: |
          dotnet tool install --global wix --version 7.0.0
          wix eula accept wix7

      - name: Install npm dependencies
        working-directory: windows-vps/dashboard
        run: npm ci --ignore-scripts

      - name: Build React frontend
        working-directory: windows-vps/dashboard
        run: npm run build

      - name: Bundle Node.js backend
        working-directory: windows-vps/dashboard
        run: node scripts/bundle-backend.mjs

      - name: Download Node.js runtime
        working-directory: windows-vps/dashboard
        run: node scripts/download-node.mjs

      - name: Download cloudflared
        working-directory: windows-vps/dashboard
        run: node scripts/download-cloudflared.mjs

      - name: Download WinSW (service wrapper)
        working-directory: windows-vps/dashboard
        run: node scripts/download-winsw.mjs

      - name: Generate WiX file list
        shell: pwsh
        run: .\scripts\generate-wxs.ps1

      - name: Build WiX MSI
        run: |
          $version = "${{ github.event.inputs.version || github.ref_name }}"
          wix build wix\JalebiVPS.wxs wix\GeneratedFiles.wxs `
            -out dist\JalebiVPS-$version.msi `
            -bindpath dashboard\dist `
            -arch x64

      - name: Sign the MSI
        shell: pwsh
        env:
          VPS_CODESIGN_PFX_BASE64: ${{ secrets.VPS_CODESIGN_PFX_BASE64 }}
          VPS_CODESIGN_PASSWORD: ${{ secrets.VPS_CODESIGN_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          if (-not $env:VPS_CODESIGN_PFX_BASE64) {
            Write-Host "No signing cert configured; skipping (MSI will be unsigned)."
            exit 0
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:VPS_CODESIGN_PFX_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1 -ExpandProperty FullName
          $msi = Get-Item dist\JalebiVPS-*.msi | Select-Object -First 1
          & $signtool sign /f $pfxPath /p $env:VPS_CODESIGN_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 $msi.FullName
          if ($LASTEXITCODE -ne 0) { throw "signtool failed with exit code $LASTEXITCODE" }
          Remove-Item $pfxPath -Force
          Write-Host "✓ MSI signed"

      - name: Smoke test — install, verify, uninstall on a clean runner
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $msi = Get-Item dist\JalebiVPS-*.msi | Select-Object -First 1
          $ilog = "$env:RUNNER_TEMP\install.log"
          Start-Process msiexec.exe -ArgumentList "/i", "`"$($msi.FullName)`"", "/qn", "/l*v", "`"$ilog`"" -Wait
          if (-not (Select-String -Path $ilog -Pattern "Installation success" -Quiet)) {
            Get-Content $ilog | Select-Object -Last 80
            throw "MSI install failed on clean runner"
          }

          Start-Sleep -Seconds 3
          $svc = Get-Service JalebiVPS -ErrorAction SilentlyContinue
          if (-not $svc -or $svc.Status -ne "Running") {
            throw "JalebiVPS service is not running after install (status: $($svc.Status))"
          }

          $resp = Invoke-WebRequest -Uri "http://127.0.0.1:9876" -UseBasicParsing -TimeoutSec 10
          if ($resp.StatusCode -ne 200) { throw "Dashboard did not respond with 200 (got $($resp.StatusCode))" }

          $sshd = Get-Service sshd -ErrorAction SilentlyContinue
          if (-not $sshd -or $sshd.Status -ne "Running") { throw "sshd is not running after provisioning" }

          Write-Host "✓ Smoke test passed: service running, dashboard responds, sshd running"

          $ulog = "$env:RUNNER_TEMP\uninstall.log"
          Start-Process msiexec.exe -ArgumentList "/x", "`"$($msi.FullName)`"", "/qn", "/l*v", "`"$ulog`"" -Wait
          if (-not (Select-String -Path $ulog -Pattern "Removal success|Installation success" -Quiet)) {
            Get-Content $ulog | Select-Object -Last 80
            throw "MSI uninstall failed on clean runner"
          }
          $installDirGone = $false
          for ($i = 0; $i -lt 10; $i++) {
            if (-not (Test-Path "C:\Program Files\JalebiVPS")) { $installDirGone = $true; break }
            Start-Sleep -Seconds 1
          }
          if (-not $installDirGone) {
            Get-ChildItem "C:\Program Files\JalebiVPS" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            throw "Install directory was not removed on uninstall"
          }
          if (Get-Service JalebiVPS -ErrorAction SilentlyContinue) { throw "Service still registered after uninstall" }
          Write-Host "✓ Uninstall verified clean"

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-vps-msi
          path: windows-vps/dist/*.msi

  linux:
    name: Build Linux release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linux-vps/installer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Linux bundle
        run: python build.py --version ${{ github.event.inputs.version || github.ref_name }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-vps
          path: linux-vps/installer/dist/**

  release:
    name: Publish GitHub release
    needs: [windows-msi, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect distributable artifacts
        run: |
          set -e
          mkdir -p out
          cp release-artifacts/windows-vps-msi/JalebiVPS-*.msi out/
          cp release-artifacts/linux-vps/jalebi-vps-linux-x64-*.tar.gz out/
          cd out && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Create release notes
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          cat > release-notes.md <<EOF
          # JALEBI VPS ${VERSION}

          Turn any Windows laptop or Linux box into a managed edge VPS — one install, auto-update, live heartbeat to the Parakram fleet dashboard.

          ## Downloads
          | Platform | Asset | Notes |
          |----------|-------|-------|
          | Windows 10/11 (x64) | \`JalebiVPS-${VERSION}.msi\` | Code-signed with a self-signed cert — Windows SmartScreen may still prompt on first run. See note below. |
          | Linux (Ubuntu/Debian x64) | \`jalebi-vps-linux-x64-${VERSION}.tar.gz\` | Extract and run \`sudo ./install.sh\`. |

          Verify your download against \`SHA256SUMS.txt\`.

          ## Important Note: Windows SmartScreen

          The Windows MSI is built with **WiX Toolset v7** (industry-standard .msi installer), which avoids the PyInstaller antivirus false-positive issues of the previous EXE format. It is also code-signed, which prevents tampering in transit — but the certificate is currently self-signed (not from a public CA), so SmartScreen may still show a warning until it accumulates reputation or we move to a CA-issued certificate.

          ✅ **The MSI is safe.** The source code is fully open at https://github.com/Parakramtech/Parakram-Leads

          ### If Windows SmartScreen blocks it:
          - Click **More info** → **Run anyway**
          - Or right-click → Properties → **Unblock** checkbox

          ## Windows install
          1. Download \`JalebiVPS-${VERSION}.msi\`.
          2. Double-click to launch the installer wizard.
          3. Follow the setup. The app auto-updates from future releases.

          ## Linux install
          \`\`\`bash
          tar -xzf jalebi-vps-linux-x64-${VERSION}.tar.gz
          cd jalebi-vps-linux-${VERSION}
          sudo ./install.sh
          \`\`\`

          ## SHA-256 Checksums
          \`\`\`
          $(cd out && cat SHA256SUMS.txt)
          \`\`\`
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: out/*
          body_path: release-notes.md