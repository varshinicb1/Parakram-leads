name: VPS Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 2.0.0)
        required: true
        default: 2.0.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows release
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows-vps/installer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows bundle
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: python build.py --version ${{ github.event.inputs.version || github.ref_name }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-vps
          path: windows-vps/installer/dist/**

  linux:
    name: Build Linux release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linux-vps/installer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Linux bundle
        run: python build.py --version ${{ github.event.inputs.version || github.ref_name }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-vps
          path: linux-vps/installer/dist/**

  release:
    name: Publish GitHub release
    needs: [windows, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect distributable artifacts
        run: |
          set -e
          mkdir -p out
          cp release-artifacts/windows-vps/ParakramVPS-Setup.exe out/
          cp release-artifacts/linux-vps/parakram-vps-linux-x64-*.tar.gz out/
          cd out && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Create release notes
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          cat > release-notes.md <<EOF
          # Parakram VPS ${VERSION}

          Turn any Windows laptop or Linux box into a managed edge VPS — one install, auto-update, live heartbeat to the Parakram fleet dashboard.

          ## Downloads
          | Platform | Asset | Notes |
          |----------|-------|-------|
          | Windows 10/11 (x64) | \`ParakramVPS-Setup.exe\` | **Unsigned** — on first launch Windows SmartScreen shows a warning. Click **More info → Run anyway**. |
          | Linux (Ubuntu/Debian x64) | \`parakram-vps-linux-x64-${VERSION}.tar.gz\` | Extract and run \`sudo ./install.sh\`. |

          Verify your download against \`SHA256SUMS.txt\`.

          ## Windows install
          1. Download \`ParakramVPS-Setup.exe\`.
          2. Double-click → **More info → Run anyway** (unsigned build).
          3. Follow the setup wizard. The app auto-updates from future releases here.

          ## Linux install
          \`\`\`bash
          tar -xzf parakram-vps-linux-x64-${VERSION}.tar.gz
          cd parakram-vps-linux-${VERSION}
          sudo ./install.sh
          \`\`\`
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: out/*
          body_path: release-notes.md
