name: Scrape Bangalore

on:
  push:
    branches: [scrape-bangalore]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pip install google-maps-scraper playwright
          python3 -m playwright install chromium firefox

      - name: Scrape and import
        env:
          CITY: "Bangalore"
          LIMIT: "15"
          API_EMAIL: ${{ secrets.DISCOVERY_EMAIL }}
          API_PASSWORD: ${{ secrets.DISCOVERY_PASSWORD }}
        run: python3 discovery/scrape-and-import.py
